name: VM Auto Start/Stop Scheduler

on:
  schedule:
    - cron: '45 17 * * *'  # Start VM at 10:45 PM PKT (17:45 UTC)
    - cron: '0 13 * * *'   # Deallocate VM at 6:00 PM PKT (13:00 UTC)
  workflow_dispatch:

jobs:
  manage-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine action based on schedule
        id: determine
        run: |
          HOUR_MIN=$(date -u +%H%M)
          if [ "$HOUR_MIN" == "1745" ]; then
            echo "action=start" >> $GITHUB_OUTPUT
          else
            echo "action=deallocate" >> $GITHUB_OUTPUT
          fi

      - name: Start VM
        if: steps.determine.outputs.action == 'start'
        run: az vm start --resource-group MELIOR_GROUP --name melior

      - name: Deallocate VM
        if: steps.determine.outputs.action == 'deallocate'
        run: az vm deallocate --resource-group MELIOR_GROUP --name melior
